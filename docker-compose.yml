version: '3.9'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job_seeker
    volumes:
      - .:/var/www/html
    ports:
      - "8004:80"
    depends_on:
      - job_seeker

  job_seeker:
    image: mysql:8.0
    container_name: mysql_db_job_seeker
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_job_seeker
    volumes:
      - db_data_job_seeker:/var/lib/mysql
      - ./db_job_seeker.sql:/docker-entrypoint-initdb.d/database.sql:ro
    ports:
      - "3317:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_job_seeker
    depends_on:
      - job_seeker
    ports:
      - "9006:80"
    environment:
      PMA_HOST: job_seeker
      MYSQL_ROOT_PASSWORD: root
    restart: always

volumes:
  db_data_job_seeker:
